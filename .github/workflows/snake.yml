name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: AudreyTan03
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=FF69B4&color_dots=#FFF0F5,#FFD1DC,#FFB6C1,#FF69B4,#C71585
            dist/github-contribution-grid-snake-dark.svg?color_snake=FF69B4&color_dots=#1a1a1a,#2a2a2a,#3a3a3a,#FF69B4,#FF1493

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
